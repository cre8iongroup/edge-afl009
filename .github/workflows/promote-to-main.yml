name: Promote development → main

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # 4:00 AM UTC / midnight Eastern

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge origin/development into main
        run: |
          git fetch origin development
          git merge origin/development --no-ff -m "chore: scheduled promotion of development → main"

      - name: Push to main
        run: git push origin main
